{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AI Prompt Optimizer{% endblock %}</title>

    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>

<div class="layout">

    <!-- Sidebar -->
    <aside class="sidebar">

        <div class="logo">

            <img src="{% static 'images/logo.png' %}" alt="Logo">

            <div class="logo-text">
                <h2>AI Prompt</h2>
                <span>Optimizer</span>
            </div>

        </div>

        <ul class="menu">

            <li>
                <a href="{% url 'dashboard' %}">
                    <img src="{% static 'images/dashboard.svg' %}" alt="Dashboard" class="menu-icon">
                    <span>Dashboard</span>
                </a>
            </li>

            <li>
                <a href="{% url 'home' %}">
                    <img src="{% static 'images/home.svg' %}" alt="Home" class="menu-icon">
                    <span>Optimize Prompt</span>
                </a>
            </li>

            <li>
                <a href="{% url 'history' %}">
                    <img src="{% static 'images/history.svg' %}" alt="History" class="menu-icon">
                    <span>History</span>
                </a>
            </li>

            <li>
                <a href="{% url 'export_pdf' %}">
                    <img src="{% static 'images/document.svg' %}" alt="Document" class="menu-icon">
                    <span>Export PDF</span>
                </a>
            </li>

        </ul>

        <div class="logout">
            <a href="{% url 'logout' %}">Logout</a>
        </div>

    </aside>

    <!-- Main -->
    <div class="main">

        <header class="topbar">

            <div class="top-title">
                <h2>Hello, {{ user.username }}</h2>
            </div>

            <div class="top-right">

                <img src="{% static 'images/moon.svg' %}" class="top-icon" alt="Dark Mode">

                <img src="{% static 'images/bell.svg' %}" class="top-icon" alt="Notifications">

            </div>

        </header>

        <div class="content">

            {% block content %}
            {% endblock %}

        </div>

    </div>

</div>

</body>
</html>
