{% extends 'base.html' %}

{% block content %}

<h1>Login</h1>

<form method="POST">

    {% csrf_token %}

    <input type="text" name="username" placeholder="Username" required>

    <br><br>

    <input type="password" name="password" placeholder="Password" required>

    <br><br>

    <button type="submit">
        Login
    </button>

</form>

{% if error %}

<p>{{ error }}</p>

{% endif %}

{% endblock %}
